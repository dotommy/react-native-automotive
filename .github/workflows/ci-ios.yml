name: ci/ios

on:
  push:
    branches:
      - master
      - main
      - dev
    paths:
      - 'packages/core/ios/**'
      - 'packages/core/react-native-automotive.podspec'
      - 'packages/core/src/specs/**'
      - 'packages/expo-plugin/**'
      - 'apps/example/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/ci-ios.yml'

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/core/ios/**'
      - 'packages/core/react-native-automotive.podspec'
      - 'packages/core/src/specs/**'
      - 'packages/expo-plugin/**'
      - 'apps/example/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/ci-ios.yml'

  workflow_dispatch:

jobs:
  build:
    name: Build example app (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      # Build the TS packages so the plugin's lib/ exists before
      # `expo prebuild` requires it via `app.plugin.js`.
      - name: Build TS packages
        run: |
          yarn turbo run build \
            --filter=react-native-automotive \
            --filter=react-native-automotive-expo-plugin

      # Generate ios/ via expo prebuild — this is also where the
      # react-native-automotive-expo-plugin runs (Info.plist scene config,
      # Entitlements, AppDelegate notifications delegate install).
      - name: Expo prebuild (iOS)
        working-directory: apps/example
        run: npx expo prebuild --platform ios --no-install

      - name: Restore Pods cache
        uses: actions/cache@v4
        with:
          path: apps/example/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('apps/example/ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Pod install
        working-directory: apps/example/ios
        run: pod install

      - name: Build (Debug, Simulator)
        working-directory: apps/example/ios
        run: |
          # Workspace + scheme names are derived from the app's `name` in
          # app.config.js (CarPlayExample → CarPlayExample.xcworkspace).
          xcodebuild \
            -workspace CarPlayExample.xcworkspace \
            -scheme CarPlayExample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload xcodebuild logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
            ~/Library/Developer/Xcode/DerivedData/**/Build/Intermediates.noindex/**/*.dia
          retention-days: 7
          if-no-files-found: warn
