name: ci/ios

on:
  push:
    branches:
      - master
      - main
      - dev
    paths:
      - 'packages/core/ios/**'
      - 'packages/core/react-native-automotive.podspec'
      - 'packages/core/src/specs/**'
      - 'apps/example/ios/**'
      - 'apps/example/package.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/ci-ios.yml'

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/core/ios/**'
      - 'packages/core/react-native-automotive.podspec'
      - 'packages/core/src/specs/**'
      - 'apps/example/ios/**'
      - 'apps/example/package.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/ci-ios.yml'

  workflow_dispatch:

jobs:
  build:
    name: Build example app (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Restore Pods cache
        uses: actions/cache@v4
        with:
          path: apps/example/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('apps/example/ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      # RN 0.71 ships a boost.podspec pointing to boostorg.jfrog.io which
      # serves an inconsistent archive (checksum mismatch). Patch the URL
      # to the stable archives.boost.io mirror before pod install.
      # Remove when example app is bumped to RN 0.76+ at Step 10.
      - name: Patch boost.podspec (RN 0.71 jfrog mirror is broken)
        run: |
          sed -i '' 's|boostorg.jfrog.io/artifactory/main|archives.boost.io|g' \
            node_modules/react-native/third-party-podspecs/boost.podspec

      # Flipper (RN 0.71 default) fails to compile on Xcode 15: std::function
      # template alias resolution differs in the newer libc++, producing errors
      # like "no template named 'function' in namespace 'std'" and "SocketEventHandler
      # is not a function or function pointer". Flipper was deprecated in RN 0.73
      # and removed in 0.74 — disable it via the standard NO_FLIPPER env var.
      - name: Pod install (Flipper disabled — RN 0.71 + Xcode 15 incompat)
        working-directory: apps/example/ios
        env:
          NO_FLIPPER: "1"
        run: pod install --repo-update

      - name: Build (Debug, Simulator)
        working-directory: apps/example/ios
        run: |
          xcodebuild \
            -workspace RNCarPlayScene.xcworkspace \
            -scheme RNCarPlayScene \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload xcodebuild logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
            ~/Library/Developer/Xcode/DerivedData/**/Build/Intermediates.noindex/**/*.dia
          retention-days: 7
          if-no-files-found: warn
