name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - 'apps/docs/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

# Single in-flight deploy at a time; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for lastUpdated timestamps

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (yarn 4)
        run: corepack enable

      - name: Install deps
        run: yarn install --immutable

      - name: Build docs
        run: yarn workspace @automotive/docs build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
