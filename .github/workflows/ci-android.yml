name: ci/android

on:
  push:
    branches:
      - master
      - main
      - dev
    paths:
      - 'packages/core/android/**'
      - 'packages/core/src/specs/**'
      - 'packages/expo-plugin/**'
      - 'apps/example/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/ci-android.yml'

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/core/android/**'
      - 'packages/core/src/specs/**'
      - 'packages/expo-plugin/**'
      - 'apps/example/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/ci-android.yml'

  workflow_dispatch:

jobs:
  build:
    name: Build example app (Android Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      # Build the TS packages so the plugin's lib/ exists before
      # `expo prebuild` requires it via `app.plugin.js`.
      - name: Build TS packages
        run: |
          yarn turbo run build \
            --filter=react-native-automotive \
            --filter=react-native-automotive-expo-plugin

      # Generate android/ via expo prebuild — this is also where the
      # react-native-automotive-expo-plugin runs (AndroidManifest
      # uses-permission entries for androidx.car.app.*).
      - name: Expo prebuild (Android)
        working-directory: apps/example
        run: npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build (Debug)
        working-directory: apps/example/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-reports
          path: |
            apps/example/android/**/build/reports/**
            apps/example/android/**/build/outputs/logs/**
          retention-days: 7
          if-no-files-found: warn
